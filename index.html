<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0b0d10">
  <title>Capital Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0d10;
      --bg-elevated: #14161b;
      --bg-card: #1a1d24;
      --border: rgba(255,255,255,0.06);
      --text: #f0f1f5;
      --text-muted: #8b92a8;
      --success: #3dd598;
      --destructive: #ff6b6b;
      --primary: #4dabf7;
      --primary-soft: rgba(77,171,247,0.12);
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'DM Mono', 'SF Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    #root { height: 100%; }
    .app { height: 100%; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; position: relative; background: var(--bg); }
    .page { flex: 1; overflow-y: auto; scrollbar-width: none; }
    .page::-webkit-scrollbar { display: none; }
    .font-mono { font-family: var(--font-mono); }

    .icon { width: 20px; height: 20px; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .icon-xs { width: 14px; height: 14px; stroke-width: 2.5; }
    .icon-sm { width: 16px; height: 16px; stroke-width: 2; }
    .icon-lg { width: 24px; height: 24px; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      border: none; border-radius: 12px; padding: 10px 16px; font-family: inherit;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .btn-primary { background: var(--primary); color: #000; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-ghost {
      background: transparent; color: var(--text-muted); border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .btn-danger { background: rgba(255,107,107,0.12); color: var(--destructive); }

    .input {
      width: 100%; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px; font-family: inherit; font-size: 14px;
      color: var(--text); outline: none; transition: border-color 0.15s;
    }
    .input:focus { border-color: var(--primary); }
    .input::placeholder { color: var(--text-muted); opacity: 0.6; }

    .bottom-nav {
      display: flex; align-items: center; justify-content: space-around;
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      background: rgba(11,13,16,0.85); backdrop-filter: blur(20px);
      border-top: 1px solid var(--border); z-index: 50;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      color: var(--text-muted); text-decoration: none; font-size: 10px; font-weight: 500;
      padding: 4px 12px; border-radius: 10px; transition: color 0.15s;
    }
    .nav-item.active { color: var(--primary); }
    .nav-center {
      width: 48px; height: 48px; border-radius: 50%;
      background: var(--primary); color: #000;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(77,171,247,0.3);
      margin-top: -16px;
    }

    .tx-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 0;
    }
    .tx-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .tx-icon.income { background: rgba(61,213,152,0.12); color: var(--success); }
    .tx-icon.expense { background: rgba(255,107,107,0.12); color: var(--destructive); }
    .tx-icon.o2c { background: rgba(139,146,168,0.12); color: var(--text-muted); }
    .tx-meta { flex: 1; min-width: 0; }
    .tx-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-badge {
      display: inline-block; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
      padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.06); color: var(--text-muted); margin-right: 6px;
    }
    .tx-date { font-size: 11px; color: var(--text-muted); }
    .tx-amount { font-family: var(--font-mono); font-size: 14px; font-weight: 500; white-space: nowrap; }
    .tx-amount.income { color: var(--success); }
    .tx-amount.expense { color: var(--destructive); }
    .tx-amount.o2c { color: var(--text-muted); }
    .tx-recurring {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 9px; color: var(--primary); background: var(--primary-soft);
      padding: 1px 5px; border-radius: 4px; margin-left: 4px; font-weight: 600;
    }

    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, rgba(255,255,255,0.04) 50%, var(--bg-card) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    .chat-msg { max-width: 85%; padding: 12px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
    .chat-msg.user { align-self: flex-end; background: var(--primary); color: #000; border-bottom-right-radius: 4px; }
    .chat-msg.ai { align-self: flex-start; background: var(--bg-card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .chat-input-wrap {
      display: flex; gap: 8px; padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      background: var(--bg-elevated); border-top: 1px solid var(--border);
    }
    .chat-input {
      flex: 1; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 10px 16px; font-family: inherit; font-size: 14px;
      color: var(--text); outline: none;
    }
    .chat-input:focus { border-color: var(--primary); }
    .chat-send {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--primary); color: #000; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted);
      display: inline-block; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    @media print {
      body * { visibility: hidden !important; }
      #print-area, #print-area * { visibility: visible !important; }
      #print-area { position: absolute; top: 0; left: 0; width: 100%; padding: 32px; background: white; color: #111; }
      .no-print { display: none !important; }
    }

    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    const fmtDate = (iso) => new Date(iso).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
    const fmtFull = (iso) => new Date(iso).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    const fmtMoney = (n) => '\u20b9' + Math.round(n).toLocaleString('en-IN');
    const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
    const nowISO = () => new Date().toISOString();
    const todayStr = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };

    const DB = {
      getTxs: () => { try { return JSON.parse(localStorage.getItem('cl_txs') || '[]'); } catch { return []; } },
      setTxs: (v) => localStorage.setItem('cl_txs', JSON.stringify(v)),
      getWish: () => { try { return JSON.parse(localStorage.getItem('cl_wish') || '[]'); } catch { return []; } },
      setWish: (v) => localStorage.setItem('cl_wish', JSON.stringify(v)),
      getMsgs: () => { try { return JSON.parse(localStorage.getItem('cl_msgs') || '[]'); } catch { return []; } },
      setMsgs: (v) => localStorage.setItem('cl_msgs', JSON.stringify(v)),
      getTip: () => { try { return JSON.parse(localStorage.getItem('cl_tip') || 'null'); } catch { return null; } },
      setTip: (v) => localStorage.setItem('cl_tip', JSON.stringify(v)),
      getHide: () => localStorage.getItem('cl_hide') === 'true',
      setHide: (v) => localStorage.setItem('cl_hide', v ? 'true' : 'false'),
      getKey: () => localStorage.getItem('cl_key') || '',
      setKey: (v) => localStorage.setItem('cl_key', v),
    };

    /* START FROM ZERO - no demo data seeded */

    function computeSummary(txs) {
      const inflow = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const outflow = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      const cats = {};
      txs.forEach(t => { cats[t.category] = (cats[t.category] || 0) + t.amount; });
      return { totalCapital: inflow - outflow, totalInflow: inflow, totalOutflow: outflow, categoryTotals: cats };
    }

    function getRecurring(txs) {
      const c = {};
      txs.forEach(t => { const k = t.title.toLowerCase().trim(); c[k] = (c[k] || 0) + 1; });
      return new Set(Object.keys(c).filter(k => c[k] > 1));
    }

    function getMonthly(txs) {
      const by = {};
      txs.forEach(tx => {
        const d = new Date(tx.createdAt);
        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        const label = d.toLocaleDateString('en-IN', { month: 'short', year: '2-digit' });
        if (!by[key]) by[key] = { label, key, inflow: 0, outflow: 0 };
        if (tx.type === 'income') by[key].inflow += tx.amount;
        if (tx.type === 'expense') by[key].outflow += tx.amount;
      });
      const sorted = Object.keys(by).sort();
      let cap = 0;
      return sorted.map(k => {
        cap += by[k].inflow - by[k].outflow;
        return { ...by[k], capital: cap };
      });
    }

    function useHash() {
      const [path, setPath] = useState(() => window.location.hash.replace('#', '') || '/');
      useEffect(() => {
        const onChange = () => setPath(window.location.hash.replace('#', '') || '/');
        window.addEventListener('hashchange', onChange);
        return () => window.removeEventListener('hashchange', onChange);
      }, []);
      const navigate = useCallback((p) => { window.location.hash = p; }, []);
      return [path, navigate];
    }

    function Icon({ name, className = '' }) {
      const c = `icon ${className}`;
      switch (name) {
        case 'home': return <svg className={c} viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        case 'list': return <svg className={c} viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>;
        case 'plus': return <svg className={c} viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        case 'star': return <svg className={c} viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
        case 'message': return <svg className={c} viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
        case 'chevron-left': return <svg className={c} viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>;
        case 'eye': return <svg className={c} viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>;
        case 'eye-off': return <svg className={c} viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>;
        case 'refresh': return <svg className={c} viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>;
        case 'arrow-down': return <svg className={c} viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>;
        case 'arrow-up': return <svg className={c} viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>;
        case 'minus': return <svg className={c} viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        case 'download': return <svg className={c} viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        case 'printer': return <svg className={c} viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;
        case 'file-text': return <svg className={c} viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>;
        case 'send': return <svg className={c} viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
        case 'calendar': return <svg className={c} viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
        case 'sparkles': return <svg className={c} viewBox="0 0 24 24"><path d="m12 3-1.5 4.5L6 9l4.5 1.5L12 15l1.5-4.5L18 9l-4.5-1.5z"/><path d="M5 15l-1 3-3 1 3 1 1 3 1-3 3-1-3-1-1-3z"/><path d="M19 15l-1 3-3 1 3 1 1 3 1-3 3-1-3-1-1-3z"/></svg>;
        case 'bot': return <svg className={c} viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>;
        case 'arrow-up-right': return <svg className={c} viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>;
        case 'trash': return <svg className={c} viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        default: return null;
      }
    }

    function BottomNav({ path }) {
      const items = [
        { icon: 'home', label: 'Home', href: '/' },
        { icon: 'list', label: 'Records', href: '/all' },
        { icon: 'plus', label: '', href: '/add', center: true },
        { icon: 'star', label: 'Wishlist', href: '/wishlist' },
        { icon: 'message', label: 'Chat', href: '/chat' },
      ];
      return (
        <nav className="bottom-nav no-print">
          {items.map(item => (
            <a key={item.href} href={`#${item.href}`} className={item.center ? 'nav-center' : `nav-item ${path === item.href ? 'active' : ''}`}>
              <Icon name={item.icon} className={item.center ? 'icon-lg' : ''} />
              {!item.center && <span>{item.label}</span>}
            </a>
          ))}
        </nav>
      );
    }

    function TxItem({ tx, isRecurring }) {
      const iconMap = { income: 'arrow-down', expense: 'arrow-up', o2c: 'minus' };
      return (
        <div className="tx-item">
          <div className={`tx-icon ${tx.type}`}><Icon name={iconMap[tx.type]} className="icon-sm" /></div>
          <div className="tx-meta">
            <div className="tx-title">
              {tx.title}
              {isRecurring && <span className="tx-recurring"><Icon name="sparkles" className="icon-xs" />Recurring</span>}
            </div>
            <div style={{ marginTop: 2 }}>
              <span className="tx-badge">{tx.category}</span>
              <span className="tx-date">{fmtDate(tx.createdAt)}</span>
            </div>
          </div>
          <div className={`tx-amount ${tx.type}`}>
            {tx.type === 'income' ? '+' : tx.type === 'expense' ? '-' : ''}{fmtMoney(tx.amount)}
          </div>
        </div>
      );
    }

    function PieChartSVG({ data, size = 200 }) {
      const total = data.reduce((s, d) => s + d.value, 0);
      const cx = size / 2, cy = size / 2, r = size / 2 - 20;
      let start = -Math.PI / 2;
      const paths = [];
      data.forEach((d, i) => {
        const angle = total ? (d.value / total) * 2 * Math.PI : 0;
        const end = start + angle;
        const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start);
        const x2 = cx + r * Math.cos(end), y2 = cy + r * Math.sin(end);
        const large = angle > Math.PI ? 1 : 0;
        paths.push({ d: `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`, color: d.color, key: i });
        start = end;
      });
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: 'block', margin: '0 auto' }}>
          {paths.map(p => <path key={p.key} d={p.d} fill={p.color} stroke="var(--bg-card)" strokeWidth="2" />)}
          <circle cx={cx} cy={cy} r={r * 0.55} fill="var(--bg-card)" />
        </svg>
      );
    }

    function AreaChartSVG({ data, width = 320, height = 160 }) {
      const pad = 28;
      const vals = data.map(d => d.capital);
      const maxV = Math.max(...vals, 1), minV = Math.min(...vals, 0);
      const range = maxV - minV || 1;
      const step = (width - 2 * pad) / (data.length - 1 || 1);
      let line = '', area = `M ${pad} ${height - pad}`;
      data.forEach((d, i) => {
        const x = pad + i * step;
        const y = height - pad - ((d.capital - minV) / range) * (height - 2 * pad);
        if (i === 0) line += `M ${x} ${y}`; else line += ` L ${x} ${y}`;
        area += ` L ${x} ${y}`;
      });
      area += ` L ${pad + (data.length - 1) * step} ${height - pad} Z`;
      return (
        <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
          <defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--primary)" stopOpacity="0.2"/><stop offset="100%" stopColor="var(--primary)" stopOpacity="0"/></linearGradient></defs>
          {[0,1,2,3].map(i => <line key={i} x1={pad} y1={pad + i*((height-2*pad)/3)} x2={width-pad} y2={pad + i*((height-2*pad)/3)} stroke="rgba(255,255,255,0.04)" strokeDasharray="3 3"/>)}
          <path d={area} fill="url(#areaGrad)"/>
          <path d={line} fill="none" stroke="var(--primary)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          {data.map((d,i) => {
            const x = pad + i*step, y = height - pad - ((d.capital-minV)/range)*(height-2*pad);
            return <circle key={i} cx={x} cy={y} r={3} fill="var(--primary)"/>;
          })}
        </svg>
      );
    }

    function BarChartSVG({ data, width = 320, height = 160 }) {
      const pad = 28, maxV = Math.max(...data.map(d => Math.max(d.inflow,d.outflow)), 1);
      const groupW = (width - 2*pad) / data.length, barW = groupW * 0.35;
      return (
        <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
          {[0,1,2,3].map(i => <line key={i} x1={pad} y1={pad+i*((height-2*pad)/3)} x2={width-pad} y2={pad+i*((height-2*pad)/3)} stroke="rgba(255,255,255,0.04)" strokeDasharray="3 3"/>)}
          {data.map((d,i) => {
            const gx = pad + i*groupW, inH = (d.inflow/maxV)*(height-2*pad), outH = (d.outflow/maxV)*(height-2*pad);
            return (
              <g key={i}>
                <rect x={gx+groupW*0.12} y={height-pad-inH} width={barW} height={inH} rx={3} fill="var(--success)" opacity={0.85}/>
                <rect x={gx+groupW*0.12+barW+3} y={height-pad-outH} width={barW} height={outH} rx={3} fill="var(--destructive)" opacity={0.85}/>
                <text x={gx+groupW/2} y={height-pad+14} textAnchor="middle" fill="var(--text-muted)" fontSize="9" fontFamily="var(--font-body)">{d.label}</text>
              </g>
            );
          })}
        </svg>
      );
    }

      }, [txs, filter]);
      const incomeTxs = filtered.filter(t => t.type === 'income');

      const o2cTxs = filtered.filter(t => t.type === 'o2c');

          return `${date},${title},${t.category},${t.type},${sign}${t.amount}`;

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });

        const a = document.createElement('a');
        a.href = url; a.download = `capital-ledger-${todayStr()}.csv`; a.click();

              </>
            )}
            {monthly.length === 0 && <div style={{ textAlign:'center', padding:'60px 0', color:'var(--text-muted)' }}>Add transactions across months to see your timeline.</div>}
          </div>
        </div>
      );
    }

    function WishlistPage() {
      const [items, setItems] = useState(DB.getWish);
      const [name, setName] = useState('');
      const [price, setPrice] = useState('');
      const txs = DB.getTxs();
      const summary = computeSummary(txs);
      const dailyIncome = summary.totalInflow / 22;

      const add = (e) => {
        e.preventDefault();
        if (!name.trim() || !price) return;
        const item = { id: uid(), name: name.trim(), price: parseFloat(price), createdAt: nowISO() };
        DB.setWish([item, ...items]); setItems(DB.getWish()); setName(''); setPrice('');
      };

      const remove = (id) => { DB.setWish(items.filter(i => i.id !== id)); setItems(DB.getWish()); };

      return (
        <div className="page">
          <div style={{ padding: '48px 20px 20px' }}>
            <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:20 }}>
              <a href="#" style={{ color:'var(--text-muted)', textDecoration:'none', display:'flex' }}><Icon name="chevron-left" /></a>
              <h1 style={{ fontSize:16, fontWeight:700 }}>Wishlist</h1>
            </div>

            <form onSubmit={add} style={{ display:'flex', gap:8, marginBottom:20 }}>
              <input className="input" placeholder="What do you want?" value={name} onChange={e => setName(e.target.value)} style={{ flex:2 }} required />
              <input className="input" type="number" min="1" placeholder="Price" value={price} onChange={e => setPrice(e.target.value)} style={{ flex:1 }} required />
              <button type="submit" className="btn btn-primary" style={{ width:44, height:44, padding:0, borderRadius:12 }}><Icon name="plus" /></button>
            </form>

            {items.length === 0 ? (
              <div className="card" style={{ textAlign:'center', padding:40, color:'var(--text-muted)', fontSize:14 }}>Add something you want to save up for.</div>
            ) : (
              <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                {items.map(item => {
                  const days = dailyIncome > 0 ? Math.ceil(item.price / dailyIncome) : '\u221e';
                  return (
                    <div key={item.id} className="card" style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 16px' }}>
                      <div>
                        <div style={{ fontSize:14, fontWeight:500 }}>{item.name}</div>
                        <div style={{ fontSize:11, color:'var(--text-muted)', marginTop:2 }}>{typeof days==='number' ? `~${days} working day${days===1?'':'s'} to afford` : 'Add income to calculate'}</div>
                      </div>
                      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                        <span className="font-mono" style={{ fontSize:14, fontWeight:500 }}>{fmtMoney(item.price)}</span>
                        <button onClick={() => remove(item.id)} style={{ background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', padding:4 }}><Icon name="trash" className="icon-sm" /></button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    function ChatPage() {
      const [msgs, setMsgs] = useState(DB.getMsgs);
      const [input, setInput] = useState('');
      const [sending, setSending] = useState(false);
      const [key, setKey] = useState(DB.getKey);
      const [showKey, setShowKey] = useState(!DB.getKey());
      const bottomRef = useRef(null);
      const txs = DB.getTxs();
      const summary = computeSummary(txs);

      useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs, sending]);

      const send = async (e) => {
        e.preventDefault();
        if (!input.trim() || sending) return;
        const userMsg = { id: uid(), role: 'user', text: input.trim(), createdAt: nowISO() };
        const all = [...msgs, userMsg];
        setMsgs(all); setInput(''); setSending(true);
        if (!key) { setSending(false); return; }

        const prompt = `You are Capital AI, a concise personal finance advisor for someone in India (currency: \u20b9). Their data:\nTotal Capital: \u20b9${summary.totalCapital}\nTotal Inflow: \u20b9${summary.totalInflow}\nTotal Outflow: \u20b9${summary.totalOutflow}\nTransactions:\n${txs.slice(0,30).map(t => `- ${t.title}: \u20b9${t.amount} (${t.type}, ${t.category}, ${fmtFull(t.createdAt)})`).join('\n')}\n\nAnswer briefly (1-3 sentences). Be helpful and direct.`;

        try {
          const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({contents:[{parts:[{text: prompt + '\n\nUser: ' + userMsg.text}]}]})
          });
          const json = await resp.json();
          const text = json.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, I could not process that.';
          const aiMsg = { id: uid(), role: 'ai', text, createdAt: nowISO() };
          const final = [...all, aiMsg]; DB.setMsgs(final); setMsgs(final);
        } catch {
          const aiMsg = { id: uid(), role: 'ai', text: 'Something went wrong. Check your API key and try again.', createdAt: nowISO() };
          const final = [...all, aiMsg]; DB.setMsgs(final); setMsgs(final);
        }
        setSending(false);
      };

      return (
        <div className="page" style={{ display:'flex', flexDirection:'column', paddingBottom:0 }}>
          <div style={{ padding:'48px 20px 12px', borderBottom:'1px solid var(--border)' }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <a href="#" style={{ color:'var(--text-muted)', textDecoration:'none', display:'flex' }}><Icon name="chevron-left" /></a>
              <div style={{ width:32, height:32, borderRadius:'50%', background:'var(--primary-soft)', display:'flex', alignItems:'center', justifyContent:'center' }}><Icon name="bot" className="icon-sm" style={{ color:'var(--primary)' }} /></div>
              <div><div style={{ fontSize:14, fontWeight:600 }}>Capital AI</div><div style={{ fontSize:10, color:'var(--text-muted)', textTransform:'uppercase', letterSpacing:'0.08em' }}>Advisor</div></div>
            </div>
          </div>

          {showKey && (
            <div className="card" style={{ margin:'12px 16px', padding:12 }}>
              <div style={{ fontSize:12, color:'var(--text-muted)', marginBottom:8 }}>Enter your Gemini API key to enable AI chat:</div>
              <div style={{ display:'flex', gap:8 }}>
                <input className="input" type="password" placeholder="Paste API key here" value={key} onChange={e => { setKey(e.target.value); DB.setKey(e.target.value); }} style={{ fontSize:12, height:36, padding:'0 12px' }} />
                <button onClick={() => setShowKey(false)} className="btn btn-primary" style={{ padding:'0 14px', height:36, fontSize:12 }}>Save</button>
              </div>
            </div>
          )}

          <div style={{ flex:1, overflowY:'auto', padding:'12px 16px', display:'flex', flexDirection:'column', gap:10 }}>
            {msgs.length === 0 && <div className="chat-msg ai" style={{ alignSelf:'flex-start', maxWidth:'90%' }}>I can see your transactions. Ask me anything &mdash; spending habits, affordability, savings goals.</div>}
            {msgs.map(m => <div key={m.id} className={`chat-msg ${m.role}`} style={{ whiteSpace:'pre-wrap' }}>{m.text}</div>)}
            {sending && <div className="chat-msg ai" style={{ display:'flex', alignItems:'center', gap:4, padding:'14px 16px' }}><span className="typing-dot" /><span className="typing-dot" /><span className="typing-dot" /></div>}
            <div ref={bottomRef} />
          </div>

          <form onSubmit={send} className="chat-input-wrap no-print">
            <input className="chat-input" placeholder={key ? "Ask about your spending..." : "Set API key above to chat"} value={input} onChange={e => setInput(e.target.value)} disabled={!key || sending} />
            <button type="submit" className="chat-send" disabled={!key || !input.trim() || sending}><Icon name="send" className="icon-sm" /></button>
          </form>
        </div>
      );
    }

    function App() {
      const [path] = useHash();
      return (
        <div className="app">
          <div style={{ flex:1, overflow:'hidden' }}>
            {path === '/' && <HomePage />}
            {path === '/all' && <AllRecordsPage />}
            {path === '/add' && <AddPage />}
            {path === '/analytics' && <AnalyticsPage />}
            {path === '/monthly' && <MonthlyPage />}
            {path === '/wishlist' && <WishlistPage />}
            {path === '/chat' && <ChatPage />}
          </div>
          <BottomNav path={path} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
